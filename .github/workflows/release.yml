name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            name: windows-x64
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macos-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macos-x64
          - platform: ubuntu-22.04
            args: ''
            name: linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CPA Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## CPA Desktop ${{ github.ref_name }}

            Desktop manager for CLIProxyAPI — auto-download, silent background start,
            real-time logs, one-click updates.

            ### Downloads
            - **Windows**: `.msi` (recommended) or `.exe` (NSIS installer)
            - **macOS**: `.dmg`
            - **Linux**: `.AppImage` or `.deb`

            > CPA binary is downloaded automatically on first launch.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
