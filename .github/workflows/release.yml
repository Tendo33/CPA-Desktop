name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # The cross-platform lint/test gate lives in ci.yml and runs on every
  # PR + push. Tag pushes skip straight to building since CI must
  # already be green on the commit being tagged. If you ever need to
  # re-validate at release time, dispatch the CI workflow manually.

  # ── Build all platforms ───────────────────────────────────────────────────
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc'
            name: windows-x64

          # Windows ARM64 (cross-compiled on x64 runner)
          - platform: windows-latest
            rust-target: aarch64-pc-windows-msvc
            args: '--target aarch64-pc-windows-msvc'
            name: windows-arm64

          # macOS Apple Silicon (native)
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
            name: macos-arm64

          # macOS Intel (cross-compiled on Apple Silicon runner)
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
            name: macos-x64

          # Linux x64
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            args: ''
            name: linux-x64

          # Linux ARM64（ubuntu-24.04-arm 为当前 GitHub 托管 arm64 Linux 推荐标签）
          - platform: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
            args: ''
            name: linux-arm64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.name }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync versions
        shell: bash
        run: |
          node -e "const v=require('./package.json').version; \
            const f='src-tauri/tauri.conf.json'; \
            const j=JSON.parse(require('fs').readFileSync(f,'utf8')); \
            j.version = v; \
            require('fs').writeFileSync(f, JSON.stringify(j,null,2)+'\n');"
          node -e "const v=require('./package.json').version; \
            const fs=require('fs'); const p='src-tauri/Cargo.toml'; \
            const t=fs.readFileSync(p,'utf8').replace(/^version = .*/m, 'version = \"'+v+'\"'); \
            fs.writeFileSync(p,t);"

      - name: Detect macOS signing secrets
        if: runner.os == 'macOS'
        id: macos_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" && -n "$APPLE_CERTIFICATE_PASSWORD" && -n "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app
        if: runner.os != 'macOS' || steps.macos_signing.outputs.enabled != 'true'
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (required by tauri-plugin-updater)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          includeUpdaterJson: true
          tagName: ${{ github.ref_name }}
          releaseName: 'CPA Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## CPA Desktop ${{ github.ref_name }}

            Desktop manager for CLIProxyAPI — auto-download, silent background start,
            real-time logs, one-click updates. No terminal window required.

            ### Platform Downloads

            | Platform | File |
            |----------|------|
            | Windows x64 | `CPA Desktop_*_x64_en-US.msi` or `*_x64-setup.exe` |
            | Windows ARM64 | `CPA Desktop_*_arm64_en-US.msi` |
            | macOS Apple Silicon | `CPA Desktop_*_aarch64.dmg` |
            | macOS Intel | `CPA Desktop_*_x64.dmg` |
            | Linux x64 | `cpa-desktop_*_amd64.AppImage` or `.deb` |
            | Linux ARM64 | `cpa-desktop_*_arm64.AppImage` or `.deb` |

            > **Note:** The CLIProxyAPI binary is downloaded automatically on first launch (~14 MB).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build Tauri app (signed macOS)
        if: runner.os == 'macOS' && steps.macos_signing.outputs.enabled == 'true'
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (required by tauri-plugin-updater)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing is enabled only when the required secrets are present.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          includeUpdaterJson: true
          tagName: ${{ github.ref_name }}
          releaseName: 'CPA Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## CPA Desktop ${{ github.ref_name }}

            Desktop manager for CLIProxyAPI — auto-download, silent background start,
            real-time logs, one-click updates. No terminal window required.

            ### Platform Downloads

            | Platform | File |
            |----------|------|
            | Windows x64 | `CPA Desktop_*_x64_en-US.msi` or `*_x64-setup.exe` |
            | Windows ARM64 | `CPA Desktop_*_arm64_en-US.msi` |
            | macOS Apple Silicon | `CPA Desktop_*_aarch64.dmg` |
            | macOS Intel | `CPA Desktop_*_x64.dmg` |
            | Linux x64 | `cpa-desktop_*_amd64.AppImage` or `.deb` |
            | Linux ARM64 | `cpa-desktop_*_arm64.AppImage` or `.deb` |

            > **Note:** The CLIProxyAPI binary is downloaded automatically on first launch (~14 MB).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ── Tidy Windows MSI assets ─────────────────────────────────────────────
  # tauri-action's WiX bundler always emits `*_<arch>_en-US.msi` because
  # MSI packages are localized; we don't ship multiple locales so the
  # `_en-US` suffix is just noise. We also drop the `*.msi.zip` /
  # `*.msi.zip.sig` updater pairs since the Windows updater channel uses
  # the NSIS `.exe` artifacts, not the MSI bundles.
  rename-msi-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rename .msi (strip _en-US) and delete .msi.zip / .sig
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Returns one `<id>\t<name>` line per asset.
          gh api "repos/$REPO/releases/tags/$TAG" \
            --jq '.assets[] | [.id, .name] | @tsv' > assets.tsv
          while IFS=$'\t' read -r id name; do
            case "$name" in
              *_en-US.msi)
                new_name="${name/_en-US/}"
                echo "Renaming $name -> $new_name"
                gh api -X PATCH "repos/$REPO/releases/assets/$id" \
                  -f "name=$new_name" >/dev/null
                ;;
              *.msi.zip|*.msi.zip.sig)
                echo "Deleting $name"
                gh api -X DELETE "repos/$REPO/releases/assets/$id" >/dev/null
                ;;
            esac
          done < assets.tsv

  # ── macOS Universal Binary (combines arm64 + x64 .dmg) ───────────────────
  macos-universal:
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: 'CPA Desktop_${{ github.ref_name }}_aarch64.dmg'
          path: artifacts/arm64/
        continue-on-error: true # artifact name may vary

      - name: Create Universal Binary note
        run: |
          echo "Universal binary via lipo requires extracting .app from both .dmg files."
          echo "For now, separate arm64 and x64 .dmg files are provided."
          echo "A future release will include a universal .dmg."
